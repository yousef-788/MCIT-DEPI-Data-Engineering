<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yousef Page</title>


    <!-- CSS -->
    <style>

        body
        {
            background-color: #0f172a;   /* dark blue background */
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


        h1
        {
            color: white;
            background-color: #2563eb;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);

            transition: 0.3s;
        }


        h1:hover
        {
            background-color: #1e40af;
            transform: scale(1.1);
        }


    </style>


</head>



<body>

    <h1>Yousef Hamdy, Alexandria</h1>

</body>


</html>
